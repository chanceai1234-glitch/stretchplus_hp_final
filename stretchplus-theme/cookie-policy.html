    <h1>Cookie方針</h1>
    <p>ストレッチplus（以下「当店」）では、お客様の利便性向上やウェブサイトの利用状況を分析するため、Cookie（クッキー）を使用しています。</p>
<h2>1. Cookieについて</h2><p>Cookieとは、ウェブサイトがお客様のブラウザに送信する小さなデータファイルであり、お客様の端末を識別する役割を果たします。</p>
<h2>2. Cookieの無効化</h2><p>ブラウザの設定を変更することでCookieを無効にすることができますが、その場合、当サイトの一部機能がご利用いただけなくなる可能性があります。</p>
